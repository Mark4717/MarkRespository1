<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin_signin.css">
</head>
<body>

    <div class="container-fluid login-wrapper d-flex flex-column align-items-center justify-content-center">
        <h1 class="portal-title mb-4">CLINIC ADMIN PORTAL</h1>
        
        <div class="login-card p-5">
            <h2 class="welcome-text mb-5 text-center">WELCOME BACK!</h2>
            
            <form id="loginForm">
                <div class="mb-4">
                    <label class="form-label">EMAIL ADDRESS</label>
                    <input type="email" id="email" class="form-control custom-input" required>
                </div>
                
                <div class="mb-4 position-relative">
                    <label class="form-label">PASSWORD</label>
                    <input type="password" id="password" class="form-control custom-input" required>
                    <span class="password-toggle" onclick="togglePassword()">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </span>
                </div>

                <div class="mb-5">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Remember Me
                        </label>
                    </div>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-signin w-75">SIGN IN</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin_signIn.js"></script>
</body>
</html>
